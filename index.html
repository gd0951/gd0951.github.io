
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Brand Name</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="layout">

  <!-- BRAND SIDE -->
  <aside class="brand">
    <div class="brand-inner">
      <h1>BRAND NAME</h1>
      <p class="tagline">Modern. Local. Reliable.</p>
    </div>
  </aside>

  <!-- CONTENT SIDE -->
  <main class="content">

    <section class="intro">
      <h2>What We Do</h2>
      <p>
        We provide high‑quality services tailored to our local community.
        Straightforward, professional, and built around trust.
      </p>
    </section>

    <section class="services">
      <h2>Services</h2>
      <ul>
        <li>Service One</li>
        <li>Service Two</li>
        <li>Service Three</li>
      </ul>
    </section>

    <section class="contact">
      <h2>Contact</h2>
      <p>Call or message us today.</p>
      <a href="tel:07123456789">Get in Touch</a>
    </section>

  </main>

</div>

</body>
</html>
